<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Frame-Options" content="ALLOWALL">
<title>Postcards from the Road</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Rancho&family=Quicksand:wght@400;600;700&family=Playfair+Display:ital@0;1&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Quicksand', sans-serif;
  background: #f5efe6;
  min-height: 100vh;
  padding: 20px 12px 40px;
}

.page-header {
  text-align: center;
  margin-bottom: 24px;
}

.page-title {
  font-family: 'Rancho', cursive;
  font-size: 2.2rem;
  color: #3d2f1f;
  text-shadow: 2px 2px 0 rgba(217,164,65,0.3);
  line-height: 1;
}

.page-sub {
  font-size: 0.8rem;
  color: #7a6a58;
  font-weight: 600;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ── Card Grid ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  max-width: 960px;
  margin: 0 auto;
}

/* ── Postcard ── */
.postcard {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(61,47,31,0.15), 0 1px 4px rgba(61,47,31,0.1);
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  background: white;
}

.postcard:hover {
  transform: translateY(-4px) rotate(0.5deg);
  box-shadow: 0 8px 32px rgba(61,47,31,0.2);
}

/* ── Postcard Front Illustration ── */
.card-front {
  position: relative;
  height: 200px;
  overflow: hidden;
}

.card-label {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: rgba(255,255,255,0.92);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: 'Rancho', cursive;
  font-size: 1rem;
  color: #3d2f1f;
  letter-spacing: 0.5px;
  backdrop-filter: blur(4px);
}

.card-tap-hint {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(61,47,31,0.75);
  color: #f5c96a;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,20,10,0.8);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal-overlay.open {
  display: flex;
}

.modal-postcard {
  background: #fffdf7;
  border-radius: 16px;
  max-width: 560px;
  width: 100%;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
}

@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.modal-front {
  height: 240px;
  position: relative;
  overflow: hidden;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: background 0.2s;
}

.modal-close:hover { background: white; }

/* ── Postcard Back ── */
.modal-back {
  padding: 16px;
  display: flex;
  gap: 12px;
}

.back-left {
  flex: 1;
  border-right: 1px solid #e8ddd0;
  padding-right: 12px;
}

.back-title {
  font-family: 'Rancho', cursive;
  font-size: 1.1rem;
  color: #3d2f1f;
  margin-bottom: 8px;
}

.back-stamp {
  float: right;
  width: 52px;
  height: 62px;
  border: 2px solid #d9a441;
  border-radius: 4px;
  background: linear-gradient(135deg, #fff8ef, #fde8c0);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-left: 8px;
  font-size: 1.4rem;
  margin-bottom: 4px;
}

.back-stamp-label {
  font-size: 0.5rem;
  font-weight: 700;
  color: #b8832a;
  letter-spacing: 0.5px;
  margin-top: 2px;
  text-align: center;
  line-height: 1.1;
}

.back-lines {
  margin-top: 8px;
}

.back-line {
  height: 1px;
  background: #e8ddd0;
  margin-bottom: 10px;
}

.back-right {
  width: 160px;
  flex-shrink: 0;
}

/* Message area */
.message-display {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  color: #2c1810;
  line-height: 1.5;
  min-height: 60px;
  margin-bottom: 10px;
  padding: 6px;
  background: rgba(217,164,65,0.06);
  border-radius: 6px;
  border: 1px dashed #e8ddd0;
}

.message-display.empty {
  color: #b8a898;
  font-style: italic;
  font-size: 0.9rem;
  font-family: 'Quicksand', sans-serif;
}

.quick-messages {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}

.quick-msg-btn {
  background: #fff8ef;
  border: 1.5px solid #eadcc8;
  border-radius: 20px;
  padding: 5px 10px;
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  color: #3d2f1f;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.2;
}

.quick-msg-btn:hover, .quick-msg-btn.selected {
  background: #d9a441;
  border-color: #b8832a;
  color: white;
}

.custom-msg-wrap {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}

.custom-msg-input {
  flex: 1;
  border: 1.5px solid #eadcc8;
  border-radius: 8px;
  padding: 6px 8px;
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  color: #3d2f1f;
  background: #fff8ef;
  outline: none;
  resize: none;
  height: 38px;
}

.custom-msg-input:focus { border-color: #d9a441; }

.custom-msg-btn {
  background: #3d2f1f;
  color: #f5c96a;
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  font-family: 'Quicksand', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}

.custom-msg-btn:hover { background: #5c4b3b; }

/* Address lines */
.address-area {
  margin-top: 6px;
}

.address-line {
  height: 1px;
  background: #c8bdb0;
  margin-bottom: 14px;
}

.address-label {
  font-size: 0.6rem;
  color: #b8a898;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

/* ── SVG Illustrations ── */
.card-front svg, .modal-front svg {
  width: 100%;
  height: 100%;
}
</style>
</head>

let activeCard = null;

// Build card grid
const grid = document.getElementById('cardGrid');
CARDS.forEach(card => {
  const div = document.createElement('div');
  div.className = 'postcard';
  div.innerHTML = `
    <div class="card-front">
      ${card.front}
      <div class="card-label">${card.title}</div>
      <div class="card-tap-hint">TAP TO OPEN ✉️</div>
    </div>
  `;
  div.addEventListener('click', () => openCard(card));
  grid.appendChild(div);
});

function openCard(card) {
  activeCard = card;
  document.getElementById('modalFront').innerHTML = `
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    ${card.front}
  `;
  document.getElementById('modalTitle').textContent = `Greetings from ${card.title}!`;
  document.getElementById('modalStamp').innerHTML = `${card.stamp}<span class="back-stamp-label">Route 66<br>2026</span>`;

  // Reset message
  const display = document.getElementById('messageDisplay');
  display.textContent = 'Tap a message below or write your own!';
  display.className = 'message-display empty';
  document.getElementById('customInput').value = '';

  // Build quick messages
  const qm = document.getElementById('quickMessages');
  qm.innerHTML = '';
  card.messages.forEach(msg => {
    const btn = document.createElement('button');
    btn.className = 'quick-msg-btn';
    btn.textContent = msg;
    btn.addEventListener('click', () => selectMessage(msg, btn));
    qm.appendChild(btn);
  });

  document.getElementById('modalOverlay').classList.add('open');
}

function selectMessage(msg, btn) {
  document.querySelectorAll('.quick-msg-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const display = document.getElementById('messageDisplay');
  display.textContent = msg;
  display.className = 'message-display';
  document.getElementById('customInput').value = '';
}

function useCustom() {
  const val = document.getElementById('customInput').value.trim();
  if (!val) return;
  document.querySelectorAll('.quick-msg-btn').forEach(b => b.classList.remove('selected'));
  const display = document.getElementById('messageDisplay');
  display.textContent = val;
  display.className = 'message-display';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    closeModalDirect();
  }
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  activeCard = null;
}

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});
