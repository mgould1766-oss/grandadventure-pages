<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Adventure Progress Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rancho&family=Quicksand:wght@400;600;700&display=swap');

:root {
  --gold:      #d9a441;
  --gold-lt:   #f5c96a;
  --cream:     #fff8ef;
  --tan:       #eadcc8;
  --brown:     #3d2f1f;
  --brown-mid: #5c4b3b;
  --brown-lt:  #7a6a58;
  --road:      #6b6058;
  --sky:       #c8e6f5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Quicksand', sans-serif;
  background: var(--cream);
  padding: 0;
  overflow-x: hidden;
}

.scene {
  background: linear-gradient(180deg, var(--sky) 0%, #e8f4fd 55%, #d4c5b0 55%, #c4b49e 100%);
  padding: 18px 16px 0;
  position: relative;
  overflow: hidden;
}

.scene-title {
  font-family: 'Rancho', cursive;
  font-size: 2rem;
  color: var(--brown);
  text-align: center;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
  margin-bottom: 4px;
  line-height: 1;
}

.scene-sub {
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--brown-mid);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.road-wrap {
  position: relative;
  height: 48px;
  margin: 0 8px;
}

.road {
  position: absolute;
  inset: 0;
  background: var(--road);
  border-radius: 4px;
}

.road::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 3px;
  background: repeating-linear-gradient(90deg, #f5c96a 0, #f5c96a 18px, transparent 18px, transparent 32px);
  transform: translateY(-50%);
}

.road-fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: linear-gradient(90deg, var(--gold), var(--gold-lt));
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(.34,1.2,.64,1);
  width: 0%;
}

.car {
  position: absolute;
  top: 50%;
  transform: translateY(-60%) translateX(-50%) scaleX(-1);
  font-size: 1.6rem;
  transition: left 0.8s cubic-bezier(.34,1.2,.64,1);
  left: 0%;
  filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));
  z-index: 10;
}

.flag-start, .flag-end {
  position: absolute;
  top: -18px;
  font-weight: 700;
  font-family: 'Quicksand', sans-serif;
  font-size: 0.6rem;
  color: var(--brown-mid);
  white-space: nowrap;
}
.flag-start { left: 0; }
.flag-end   { right: 0; text-align: right; }

.road-status {
  text-align: center;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--brown-mid);
  padding: 8px 0 14px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 12px 12px 0;
}

.stat-card {
  background: white;
  border: 1.5px solid var(--tan);
  border-radius: 14px;
  padding: 12px 10px;
  text-align: center;
}

.stat-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--brown-lt);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.stat-value {
  font-family: 'Rancho', cursive;
  font-size: 1.8rem;
  color: var(--brown);
  line-height: 1;
}

.stat-value.small {
  font-size: 1.1rem;
  line-height: 1.3;
}

.bubbles-wrap {
  padding: 14px 12px 0;
}

.bubbles-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--brown-lt);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-align: center;
}

.bubbles {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

.bubble {
  background: #f3eadf;
  color: var(--brown-mid);
  border-radius: 999px;
  padding: 6px 14px;
  font-weight: 700;
  font-size: 0.8rem;
  transition: all 0.4s ease;
  border: 2px solid transparent;
}

.bubble.active {
  background: var(--gold);
  color: var(--brown);
  border-color: #b8832a;
  box-shadow: 0 2px 8px rgba(217,164,65,0.4);
}

.bubble.current {
  background: var(--brown);
  color: var(--gold-lt);
  border-color: var(--gold);
  box-shadow: 0 2px 10px rgba(61,47,31,0.35);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.social-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px 0;
}

.follow-btn {
  flex: 1;
  display: block;
  text-decoration: none;
  background: var(--gold);
  color: var(--brown);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  font-weight: 700;
  font-size: 0.82rem;
  transition: all 0.2s;
  border: 2px solid #b8832a;
}

.follow-btn:hover { background: var(--gold-lt); transform: translateY(-2px); }

.fb-btn {
  flex: 1;
  display: block;
  text-decoration: none;
  background: #1877f2;
  color: white;
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  font-weight: 700;
  font-size: 0.82rem;
  transition: all 0.2s;
}

.fb-btn:hover { background: #1461c8; transform: translateY(-2px); }

.admin-toggle {
  text-align: center;
  padding: 14px 12px 4px;
}

.admin-toggle button {
  background: none;
  border: 1.5px dashed var(--tan);
  color: var(--brown-lt);
  border-radius: 20px;
  padding: 5px 16px;
  font-family: 'Quicksand', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
}

.admin-panel {
  display: none;
  background: white;
  border: 2px solid var(--tan);
  border-radius: 16px;
  margin: 8px 12px 0;
  padding: 16px;
}

.admin-panel.open { display: block; }

.admin-title {
  font-family: 'Rancho', cursive;
  font-size: 1.3rem;
  color: var(--brown);
  margin-bottom: 10px;
  text-align: center;
}

.pin-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}

.pin-input {
  flex: 1;
  border: 2px solid var(--tan);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Quicksand', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--brown);
  background: var(--cream);
  outline: none;
}

.pin-input:focus { border-color: var(--gold); }

.pin-btn {
  background: var(--brown);
  color: var(--gold-lt);
  border: none;
  border-radius: 10px;
  padding: 8px 16px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.2s;
}

.pin-btn:hover { background: var(--brown-mid); }

.city-grid {
  display: none;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-top: 4px;
}

.city-grid.unlocked { display: grid; }

.city-btn {
  background: var(--cream);
  border: 2px solid var(--tan);
  border-radius: 10px;
  padding: 8px 10px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.75rem;
  color: var(--brown);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.3;
}

.city-btn:hover { border-color: var(--gold); background: #fff3d6; }
.city-btn.selected { background: var(--gold); border-color: #b8832a; color: var(--brown); }

.city-btn .city-miles {
  display: block;
  font-size: 0.65rem;
  color: var(--brown-lt);
  font-weight: 600;
  margin-top: 1px;
}

.city-btn.selected .city-miles { color: var(--brown-mid); }

.admin-save {
  display: none;
  width: 100%;
  margin-top: 10px;
  background: var(--gold);
  border: none;
  border-radius: 12px;
  padding: 11px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--brown);
  cursor: pointer;
  transition: background 0.2s;
}

.admin-save.visible { display: block; }
.admin-save:hover { background: var(--gold-lt); }

.admin-msg {
  text-align: center;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--brown-mid);
  margin-top: 8px;
  min-height: 20px;
}

.bottom-pad { height: 20px; }
</style>
</head>
<body>

<div class="scene">
  <div class="scene-title">🛣️ Grand Adventure</div>
  <div class="scene-sub">Route 66 · June 2026</div>
  <div class="road-wrap">
    <div class="flag-start">🏁 Goldsboro, NC</div>
    <div class="flag-end">🌊 Santa Monica, CA</div>
    <div class="road">
      <div class="road-fill" id="roadFill"></div>
    </div>
    <div class="car" id="carEmoji">🚙</div>
  </div>
  <div class="road-status" id="roadStatus">Packing up and ready to roll! 🧳</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Miles Traveled</div>
    <div class="stat-value" id="statMiles">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">States Crossed</div>
    <div class="stat-value" id="statStates">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Current Location</div>
    <div class="stat-value small" id="statLocation">Goldsboro, NC</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Next Stop</div>
    <div class="stat-value small" id="statNext">Huntington, WV</div>
  </div>
</div>

<div class="bubbles-wrap">
  <div class="bubbles-label">States on our route</div>
  <div class="bubbles" id="bubblesRow"></div>
</div>

<div class="social-row">
  <a href="#" id="followBtn" class="follow-btn">✉️ Follow Our Journey</a>
  <a href="#" id="fbShare" class="fb-btn" target="_blank" rel="noopener">👍 Share on Facebook</a>
</div>

<div class="admin-toggle">
  <button onclick="toggleAdmin()">⚙ Update Our Location</button>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-title">📍 Where Are We Now?</div>
  <div class="pin-row">
    <input class="pin-input" type="password" id="pinInput" placeholder="Enter PIN" maxlength="6">
    <button class="pin-btn" onclick="checkPin()">Unlock</button>
  </div>
  <div class="city-grid" id="cityGrid"></div>
  <button class="admin-save" id="adminSave" onclick="saveLocation()">✅ Update Location</button>
  <div class="admin-msg" id="adminMsg"></div>
</div>

<div class="bottom-pad"></div>

<script>
const STOPS = [
  { city: "Goldsboro",    state: "NC", miles: 0,    pct: 0,   next: "Huntington, WV",    status: "Packing up and ready to roll! 🧳" },
  { city: "Schuyler",     state: "VA", miles: 340,  pct: 12,  next: "Huntington, WV",    status: "Visiting Walton's Mountain! ❤️" },
  { city: "Huntington",   state: "WV", miles: 480,  pct: 17,  next: "Bolingbrook, IL",   status: "In the mountains of West Virginia! ⛰️" },
  { city: "Bolingbrook",  state: "IL", miles: 830,  pct: 30,  next: "Springfield, IL",   status: "Chicagoland — Route 66 officially begins! 🎉" },
  { city: "Springfield",  state: "IL", miles: 1010, pct: 36,  next: "Rolla, MO",         status: "Lincoln country, Illinois! 🎩" },
  { city: "Rolla",        state: "MO", miles: 1180, pct: 42,  next: "Tulsa, OK",         status: "Rolling through the Show-Me State! 🌾" },
  { city: "Tulsa",        state: "OK", miles: 1390, pct: 50,  next: "Amarillo, TX",      status: "Oklahoma — where the wind comes sweeping! 🌬️" },
  { city: "Amarillo",     state: "TX", miles: 1600, pct: 57,  next: "Albuquerque, NM",   status: "Texas panhandle — Cadillac Ranch! 🚗" },
  { city: "Albuquerque",  state: "NM", miles: 1810, pct: 65,  next: "Holbrook, AZ",      status: "Land of Enchantment — New Mexico! ✨" },
  { city: "Holbrook",     state: "AZ", miles: 2010, pct: 72,  next: "Williams, AZ",      status: "Wigwam Hotel night in Arizona! 🏕️" },
  { city: "Williams",     state: "AZ", miles: 2080, pct: 74,  next: "Needles, CA",       status: "Grand Canyon Railway — all aboard! 🚂" },
  { city: "Needles",      state: "CA", miles: 2230, pct: 80,  next: "Buena Park, CA",    status: "California! The desert welcomes us! 🌵" },
  { city: "Buena Park",   state: "CA", miles: 2590, pct: 93,  next: "Santa Monica Pier", status: "Disneyland days in Buena Park! 🎢" },
  { city: "Santa Monica", state: "CA", miles: 2800, pct: 100, next: "Home! 🏡",          status: "WE MADE IT! 🌊🎉 End of Route 66!" },
];

const STATE_ORDER = ["NC","VA","WV","IL","IN","MO","OK","TX","NM","AZ","CA"];
const STATES_AT = [1,1,2,4,4,5,6,7,8,9,9,10,10,10];
const ADMIN_PIN = "66road";

let currentStop = 0, pendingStop = null, adminUnlocked = false;

try {
  const saved = localStorage.getItem('rt66_stop');
  if (saved !== null) currentStop = parseInt(saved);
} catch(e) {}

buildBubbles();
buildCityGrid();
updateDisplay(currentStop, false);

document.getElementById('fbShare').href =
  'https://www.facebook.com/sharer/sharer.php?u=' +
  encodeURIComponent('https://thegrandadventure.blog');

function buildBubbles() {
  const wrap = document.getElementById('bubblesRow');
  STATE_ORDER.forEach(st => {
    const el = document.createElement('span');
    el.className = 'bubble';
    el.id = 'bubble-' + st;
    el.textContent = st;
    wrap.appendChild(el);
  });
}

function buildCityGrid() {
  const grid = document.getElementById('cityGrid');
  STOPS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'city-btn' + (i === currentStop ? ' selected' : '');
    btn.id = 'city-btn-' + i;
    btn.innerHTML = `${s.city}, ${s.state}<span class="city-miles">~${s.miles.toLocaleString()} mi from home</span>`;
    btn.addEventListener('click', () => selectCity(i));
    grid.appendChild(btn);
  });
}

function selectCity(idx) {
  pendingStop = idx;
  document.querySelectorAll('.city-btn').forEach((b, i) => b.classList.toggle('selected', i === idx));
  document.getElementById('adminSave').classList.add('visible');
  document.getElementById('adminMsg').textContent = '';
}

function updateDisplay(stopIdx) {
  const s = STOPS[stopIdx];
  document.getElementById('roadFill').style.width = s.pct + '%';
  document.getElementById('carEmoji').style.left = Math.min(97, Math.max(2, s.pct)) + '%';
  document.getElementById('roadStatus').textContent = s.status;
  document.getElementById('statMiles').textContent = s.miles.toLocaleString();
  document.getElementById('statStates').textContent = STATES_AT[stopIdx];
  document.getElementById('statLocation').textContent = s.city + ', ' + s.state;
  document.getElementById('statNext').textContent = s.next;
  STATE_ORDER.forEach((st, i) => {
    const el = document.getElementById('bubble-' + st);
    if (!el) return;
    const visited = STATES_AT[stopIdx] > i;
    const isCurrent = s.state === st;
    el.className = 'bubble' + (isCurrent ? ' current' : visited ? ' active' : '');
  });
}

function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  panel.classList.toggle('open');
  if (!panel.classList.contains('open')) {
    adminUnlocked = false;
    document.getElementById('pinInput').value = '';
    document.getElementById('cityGrid').classList.remove('unlocked');
    document.getElementById('adminSave').classList.remove('visible');
    document.getElementById('adminMsg').textContent = '';
  }
}

function checkPin() {
  if (document.getElementById('pinInput').value.trim() === ADMIN_PIN) {
    adminUnlocked = true;
    document.getElementById('cityGrid').classList.add('unlocked');
    document.getElementById('adminMsg').textContent = '✅ Unlocked! Choose our location.';
    pendingStop = currentStop;
    document.querySelectorAll('.city-btn').forEach((b, i) => b.classList.toggle('selected', i === currentStop));
  } else {
    document.getElementById('adminMsg').textContent = '❌ Wrong PIN — try again!';
  }
}

function saveLocation() {
  if (!adminUnlocked || pendingStop === null) return;
  currentStop = pendingStop;
  try { localStorage.setItem('rt66_stop', currentStop); } catch(e) {}
  updateDisplay(currentStop);
  document.getElementById('adminMsg').textContent = '🗺️ Location updated!';
  document.getElementById('adminSave').classList.remove('visible');
  document.querySelectorAll('.city-btn').forEach((b, i) => b.classList.toggle('selected', i === currentStop));
}

document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPin();
});
</script>
</body>
</html>
